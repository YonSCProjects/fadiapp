name = "fadiapp-worker"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ANTHROPIC_DESIGN_MODEL = "claude-opus-4-7"
ANTHROPIC_CHAT_MODEL = "claude-sonnet-4-6"

# Secrets (set via `wrangler secret put`):
#   ANTHROPIC_API_KEY      — server-side Anthropic API key
#   WORKER_SHARED_SECRET   — bearer the mobile app sends on every request

# [[d1_databases]]   # later: RAG corpus
# binding = "RAG_DB"
# database_name = "fadiapp-rag"
# database_id = "..."

# [[vectorize]]      # later: embeddings index
# binding = "RAG_INDEX"
# index_name = "fadiapp-curriculum"
